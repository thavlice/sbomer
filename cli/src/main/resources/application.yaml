microprofile:
  rest:
    client:
      disable:
        default:
          mapper: true

quarkus:
  banner:
    enabled: false

  rest-client:
    "gerrit":
      url: "https://${sbomer.gerrit.host}"
    "gitlab":
      url: "https://${sbomer.gitlab.host}"
    "github":
      url: "https://${sbomer.github.host}"
    "sbomer":
      url: "${sbomer.host}"
    "koji-download":
      url: "https://${sbomer.koji.download.host}"
      follow-redirects: true

  log:
    level: INFO
    category:
      "org.jboss.sbomer":
        level: DEBUG
    console:
      json:
        ~: false
      format: "%d{HH:mm:ss,SSS} %-5p traceId=%X{traceId} parentId=%X{parentId} spanId=%X{spanId} [%c{3.}] (%t) %s%e mdc:[%X]%n"
      stderr: true
    file:
      json:
        ~: false
      level: DEBUG
      enable: false
      path: cli.log
      format: "%d{HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e mdc:[%X]%n"
  oidc-client:
    client-enabled: true
    auth-server-url: http://localhost:8180/auth/realms/quarkus
    client-id: quarkus-app
    credentials:
      secret: secret

sbomer:
  ## (required)
  ## Hostname of the SBOMer service
  host: http://localhost:8080
  pnc:
    ## (required)
    ## Hostname of the PNC service
    # host:
    ## Product mapping environment, by default production mapping will be used
    product-mapping: "prod"
  ## Gerrit configuration
  # gerrit:
  #   host:
  ## GitLab configuration
  gitlab:
    #host:
  ## GitHub configuration
  github:
    ## (optional) Hostname of the GitHub server used to match SCM URLs.
    ## For public GitHub use: api.github.com
    ## For GitHub Enterprise use: <host>/api/v3 (e.g. github.ibm.com/api/v3)
    #host:
    #token:
  koji:
    #hub:
    #  url:
    #web:
    #  url:

"%dev":
  quarkus:
    log:
      category:
        "io.quarkus.kubernetes":
          level: DEBUG
    oidc-client:
      client-enabled: false

  sbomer:
    pnc:
      host: "localhost:7070/pnc/orch"

"%test":
  quarkus:
    log:
      console:
        json:
          ~: false
    oidc-client:
      client-enabled: false

  sbomer:
    pnc:
      host: "localhost:7070/pnc/orch"
